<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boarding Verification</title>

  <style>
    body {
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #071226;
      color: white;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: min(420px, 100%);
      padding: 26px;
      border-radius: 28px;
      background: #111a2a;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1;
      letter-spacing: -0.8px;
    }

    p {
      margin: 10px 0 22px;
      color: rgba(255, 255, 255, 0.58);
      font-weight: 650;
      line-height: 1.3;
    }

    input {
      width: 100%;
      height: 58px;
      box-sizing: border-box;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 18px;
      background: rgba(5, 10, 24, 0.78);
      color: white;
      padding: 0 16px;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      outline: none;
    }

    button {
      width: 100%;
      height: 54px;
      margin-top: 16px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #16e18a, #0fbf75, #069b61);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }

    .message {
      margin-top: 16px;
      font-size: 15px;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.68);
    }

    .message.good {
      color: #16e18a;
    }

    .message.bad {
      color: #ff4b4b;
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>Boarding Verification</h1>
    <p>Enter the passenger boarding code to clear them for gate departure.</p>

    <input id="boardingCodeInput" maxlength="6" placeholder="ABC123" />
    <button id="verifyButton" type="button">Verify Boarding</button>

    <div class="message" id="messageText"></div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

    import {
      getFirestore,
      collection,
      query,
      where,
      getDocs,
      doc,
      updateDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAehW0Ab5c0bpb824JyPBa43YBvyR7zwig",
      authDomain: "msfs-flight-tracker.firebaseapp.com",
      projectId: "msfs-flight-tracker",
      storageBucket: "msfs-flight-tracker.firebasestorage.app",
      messagingSenderId: "477994284624",
      appId: "1:477994284624:web:50bef41d84258420ea8355"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const boardingCodeInput = document.getElementById("boardingCodeInput");
    const verifyButton = document.getElementById("verifyButton");
    const messageText = document.getElementById("messageText");

    function setMessage(text, type = "") {
      messageText.textContent = text;
      messageText.className = `message ${type}`;
    }

    async function verifyBoardingCode() {
      const code = boardingCodeInput.value.trim().toUpperCase();

      if (!code || code.length < 6) {
        setMessage("Enter the 6-character boarding code.", "bad");
        return;
      }

      verifyButton.disabled = true;
      verifyButton.textContent = "Checking...";
      setMessage("");

      try {
        const sessionsQuery = query(
          collection(db, "boardingSessions"),
          where("boardingCode", "==", code),
          where("active", "==", true)
        );

        const snapshot = await getDocs(sessionsQuery);

        if (snapshot.empty) {
          setMessage("No active boarding session found for this code.", "bad");
          return;
        }

        const sessionDoc = snapshot.docs[0];

        await updateDoc(doc(db, "boardingSessions", sessionDoc.id), {
          verified: true,
          verifiedAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });

        setMessage("Boarding verified. Gate departure unlocked.", "good");
        boardingCodeInput.value = "";
      } catch (error) {
        console.error("Error verifying boarding:", error);
        setMessage("Boarding could not be verified. Check Firestore rules.", "bad");
      } finally {
        verifyButton.disabled = false;
        verifyButton.textContent = "Verify Boarding";
      }
    }

    verifyButton.addEventListener("click", verifyBoardingCode);

    boardingCodeInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        verifyBoardingCode();
      }
    });
  </script>
</body>
</html>
